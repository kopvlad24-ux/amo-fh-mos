<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Удаление контактов — LaresGroup AMO</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg:#0c0c0e; --surface:#141416; --surface2:#1c1c1f; --border:#2a2a2e; --accent:#e8c84a; --red:#e85555; --green:#4ac98a; --text:#f0ede8; --muted:#6b6b70; --muted2:#9b9ba0; }
  body { background:var(--bg); color:var(--text); font-family:'IBM Plex Sans',sans-serif; font-weight:300; min-height:100vh; padding:32px; }
  h1 { font-family:'Bebas Neue',sans-serif; font-size:32px; letter-spacing:3px; color:var(--red); margin-bottom:8px; }
  .sub { color:var(--muted2); font-family:'IBM Plex Mono',monospace; font-size:12px; margin-bottom:32px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:24px; margin-bottom:24px; }
  .field label { display:block; font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:1px; color:var(--muted); text-transform:uppercase; margin-bottom:6px; }
  .field input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:4px; padding:8px 12px; color:var(--text); font-family:'IBM Plex Mono',monospace; font-size:12px; outline:none; }
  .field input:focus { border-color:var(--accent); }
  .btn { border:none; border-radius:4px; padding:10px 24px; font-family:'IBM Plex Mono',monospace; font-size:12px; font-weight:500; cursor:pointer; letter-spacing:1px; transition:opacity 0.2s; margin-right:8px; }
  .btn-yellow { background:var(--accent); color:#000; }
  .btn-red { background:var(--red); color:#fff; }
  .btn:disabled { opacity:0.4; cursor:wait; }
  .btn:hover:not(:disabled) { opacity:0.85; }
  table { width:100%; border-collapse:collapse; }
  th { font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; padding:10px 14px; text-align:left; background:var(--surface2); border-bottom:1px solid var(--border); }
  td { padding:11px 14px; font-size:12px; border-bottom:1px solid var(--border); }
  tr:last-child td { border-bottom:none; }
  .badge-red { background:rgba(232,85,85,0.15); color:var(--red); padding:2px 8px; border-radius:3px; font-family:'IBM Plex Mono',monospace; font-size:11px; }
  .badge-green { background:rgba(74,201,138,0.15); color:var(--green); padding:2px 8px; border-radius:3px; font-family:'IBM Plex Mono',monospace; font-size:11px; }
  .badge-muted { background:var(--surface2); color:var(--muted2); padding:2px 8px; border-radius:3px; font-family:'IBM Plex Mono',monospace; font-size:11px; }
  .progress { height:4px; background:var(--border); border-radius:2px; overflow:hidden; margin-top:12px; }
  .progress-fill { height:100%; background:var(--accent); border-radius:2px; transition:width 0.3s; }
  .log { background:var(--surface2); border:1px solid var(--border); border-radius:4px; padding:16px; font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted2); max-height:200px; overflow-y:auto; margin-top:16px; }
  .warn { background:rgba(232,85,85,0.1); border:1px solid rgba(232,85,85,0.3); border-radius:6px; padding:16px 20px; color:var(--red); font-family:'IBM Plex Mono',monospace; font-size:12px; margin-bottom:20px; }
  .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:16px; }
  .stat { background:var(--surface2); border:1px solid var(--border); border-radius:4px; padding:16px; text-align:center; }
  .stat-val { font-family:'Bebas Neue',sans-serif; font-size:32px; }
  .stat-label { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-top:4px; }
</style>
</head>
<body>
<h1>УДАЛЕНИЕ КОНТАКТОВ</h1>
<div class="sub">laresgroup.amocrm.ru · 209 номеров · поиск по каждому номеру через API</div>

<div class="card">
  <div class="field" style="margin-bottom:16px">
    <label>Access Token (laresgroup.amocrm.ru)</label>
    <input type="password" id="inp-token" placeholder="eyJ0eXAi..." />
  </div>
  <button class="btn btn-yellow" onclick="findContacts()" id="btn-find">НАЙТИ КОНТАКТЫ</button>
</div>

<div id="results-wrap" style="display:none">
  <div class="warn" id="warn-msg"></div>
  <div class="card">
    <div class="stats">
      <div class="stat"><div class="stat-val" id="stat-checked">0</div><div class="stat-label">Проверено</div></div>
      <div class="stat"><div class="stat-val" id="stat-found" style="color:var(--accent)">0</div><div class="stat-label">Найдено</div></div>
      <div class="stat"><div class="stat-val" id="stat-deleted" style="color:var(--green)">0</div><div class="stat-label">Удалено</div></div>
      <div class="stat"><div class="stat-val" id="stat-error" style="color:var(--red)">0</div><div class="stat-label">Ошибок</div></div>
    </div>
    <button class="btn btn-red" onclick="confirmDelete()" id="btn-delete" disabled>УДАЛИТЬ ВСЕ</button>
    <div class="progress" style="margin-top:16px"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="log" id="log">Ожидаю поиска...</div>
  </div>
  <div class="card">
    <table>
      <thead><tr><th>Имя</th><th>Телефон</th><th>ID контакта</th><th>Статус</th></tr></thead>
      <tbody id="contacts-tbody"></tbody>
    </table>
  </div>
</div>

<script>
const PHONES = ["79014294950", "79160938195", "79652094038", "79167907831", "79161079820", "79854351345", "79891063414", "79852439172", "79265337444", "79264938218", "79264586998", "79264007234", "79263949359", "79263852179", "79263445832", "79262748672", "79262450633", "79261730605", "79261197646", "79260779904", "79260708573", "79256001934", "79255707309", "79255073191", "79253040900", "79251748876", "79199956143", "79168333282", "79167308868", "79164131816", "79161467581", "79161142789", "79154907567", "79154096075", "79152388903", "79104355419", "79100133332", "79096347117", "79055380222", "79037524577", "79036867340", "79163680388", "79687998809", "79255496227", "79028288700", "79250104733", "79932289847", "79852222006", "79067319793", "79855492243", "79951141305", "79168129539", "79151383696", "79653098866", "79090594947", "79033153822", "79601446826", "79107277067", "79852279319", "79670326608", "79651024110", "79265033121", "79260795100", "79259126128", "79250727765", "79199194040", "79168278594", "79166728452", "79151415552", "79127879478", "79031485937", "79639438086", "79255678128", "79032000087", "79299645933", "79100018284", "79096804967", "79651825033", "79534440000", "79261210160", "79773569588", "79199151065", "79136858617", "79853839479", "79529016272", "79375372017", "79277064301", "79999118820", "79857640931", "79379907200", "79255550221", "79233549887", "79226614155", "79220260888", "79178874968", "79168526982", "79165685788", "79163866958", "79155217788", "79119327512", "79104407279", "79094442976", "79044726093", "79031851026", "79030072255", "79168020090", "79161481860", "79055137551", "79031140314", "79139225868", "79162018001", "79651225805", "79266682096", "79778214682", "79161936208", "79114537071", "79891147824", "79266951720", "79686830468", "79250400524", "79151528854", "79969664673", "79256493701", "79056249767", "79067111163", "79853183062", "79060472910", "79821412382", "79164419464", "79170184938", "79149777450", "79161194096", "79031636305", "79647987221", "79998435678", "79672907890", "79264831705", "79953006461", "79119544011", "79161471108", "79268408600", "79600161290", "79090485828", "79807050246", "79688280408", "79220702558", "79122868894", "79161122228", "79269672451", "79857705077", "79959240994", "79853636509", "79128487651", "79037702821", "79031196115", "79266730909", "79219420667", "79366240417", "79212959504", "79259792106", "79278014706", "79645597979", "79231055419", "79209319177", "79067004456", "79259994105", "79169764139", "79377961133", "79377277555", "79663341202", "79192503664", "79625308523", "79025113573", "79053318058", "79261738595", "79053350399", "79333394710", "79257449903", "79099748847", "79377307778", "79995332849", "79151620232", "79160055531", "79227006841", "79534177744", "79773811098", "79152970441", "79261450404", "79034800585", "79280288015", "79166856984", "79273651457", "79051330206", "79294384384", "79287968888", "79936164186", "79218983368", "79939059531", "79212908899", "79163944278", "79272237699", "79852567791", "79268828505", "79261509989", "79254523249", "79779621899", "79771178295", "79269320072", "79202685272"];

function normalizePhone(p) {
  p = String(p).replace(/\D/g, '');
  if (p.startsWith('8') && p.length === 11) p = '7' + p.slice(1);
  return p;
}

let foundContacts = [];
let token = '';
let deletedCount = 0, errorCount = 0;

function log(msg) {
  const el = document.getElementById('log');
  el.innerHTML += msg + '<br>';
  el.scrollTop = el.scrollHeight;
}

async function searchByPhone(phone) {
  const res = await fetch('/api/contacts?limit=5&query=' + phone, {
    headers: { 'X-Token': token }
  });
  if (!res.ok) throw new Error('AMO ' + res.status);
  const data = await res.json();
  return data?._embedded?.contacts || [];
}

async function amoDelete(contactId) {
  const res = await fetch('/api/delete/' + contactId, {
    method: 'DELETE', headers: { 'X-Token': token }
  });
  return res.ok;
}

async function findContacts() {
  token = document.getElementById('inp-token').value.trim();
  if (!token) { alert('Введите токен'); return; }
  document.getElementById('btn-find').disabled = true;
  document.getElementById('results-wrap').style.display = 'block';
  document.getElementById('log').innerHTML = '';
  foundContacts = [];
  log('Начинаю поиск по ' + PHONES.length + ' номерам через query...');

  const tbody = document.getElementById('contacts-tbody');
  tbody.innerHTML = '';

  for (let i = 0; i < PHONES.length; i++) {
    const phone = PHONES[i];
    const norm = normalizePhone(phone);
    try {
      const contacts = await searchByPhone(norm);
      for (const c of contacts) {
        // Проверяем что телефон реально совпадает
        const hasPhone = (c.custom_fields_values || []).some(f =>
          f.field_code === 'PHONE' &&
          (f.values || []).some(v => normalizePhone(v.value || '') === norm)
        );
        if (hasPhone && !foundContacts.find(x => x.id === c.id)) {
          foundContacts.push({ id: c.id, name: c.name, phone: norm });
          tbody.innerHTML += '<tr><td>' + (c.name||'—') + '</td>' +
            '<td style="font-family:IBM Plex Mono,monospace">+' + norm + '</td>' +
            '<td style="font-family:IBM Plex Mono,monospace;color:var(--muted2)">' + c.id + '</td>' +
            '<td><span class="badge-red" id="status-' + c.id + '">Найден</span></td></tr>';
        }
      }
    } catch(e) {
      log('Ошибка на номере ' + norm + ': ' + e.message);
    }

    document.getElementById('stat-checked').textContent = i + 1;
    document.getElementById('stat-found').textContent = foundContacts.length;
    document.getElementById('progress-fill').style.width = Math.round((i+1)/PHONES.length*100) + '%';

    if ((i+1) % 20 === 0) log('Проверено: ' + (i+1) + '/' + PHONES.length + ', найдено: ' + foundContacts.length);
    await new Promise(r => setTimeout(r, 150));
  }

  log('Поиск завершён. Найдено: ' + foundContacts.length);
  document.getElementById('warn-msg').textContent = 'Найдено ' + foundContacts.length + ' контактов. Проверь список перед удалением!';
  if (foundContacts.length > 0) document.getElementById('btn-delete').disabled = false;
  document.getElementById('btn-find').disabled = false;
}

async function confirmDelete() {
  if (!confirm('Удалить ' + foundContacts.length + ' контактов из laresgroup.amocrm.ru?\n\nЭто НЕОБРАТИМО.')) return;
  document.getElementById('btn-delete').disabled = true;
  document.getElementById('btn-find').disabled = true;
  log('--- Начинаю удаление ---');
  deletedCount = 0; errorCount = 0;
  for (const c of foundContacts) {
    try {
      const ok = await amoDelete(c.id);
      const badge = document.getElementById('status-' + c.id);
      if (ok) { deletedCount++; badge.className='badge-green'; badge.textContent='Удалён'; }
      else { errorCount++; badge.className='badge-muted'; badge.textContent='Ошибка'; }
    } catch(e) { errorCount++; }
    document.getElementById('stat-deleted').textContent = deletedCount;
    document.getElementById('stat-error').textContent = errorCount;
    document.getElementById('progress-fill').style.width = Math.round((deletedCount+errorCount)/foundContacts.length*100) + '%';
    await new Promise(r => setTimeout(r, 250));
  }
  log('ГОТОВО. Удалено: ' + deletedCount + ', ошибок: ' + errorCount);
}
</script>
</body>
</html>
